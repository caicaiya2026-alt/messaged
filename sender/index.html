<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息发送端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .connection-status {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .connection-status.disconnected {
            background: #fee;
            color: #c33;
        }
        
        .connection-status.connected {
            background: #efe;
            color: #3c3;
        }
        
        .connection-status.connecting {
            background: #ffe;
            color: #c90;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }
        
        .server-config {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .message-history {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        .message-history h3 {
            color: #555;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .message-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .message-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .message-item .time {
            color: #999;
            font-size: 12px;
        }
        
        .message-item .content {
            color: #333;
            margin-top: 4px;
            word-break: break-all;
        }
        
        .message-item.success {
            border-left: 3px solid #4caf50;
        }
        
        .message-item.error {
            border-left: 3px solid #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📨 消息发送端</h1>
        
        <div id="connectionStatus" class="connection-status disconnected">
            未连接
        </div>
        
        <div class="input-group">
            <label>服务器地址</label>
            <div class="server-config">
                <input type="text" id="serverHost" placeholder="例如: localhost 或 192.168.1.100" value="localhost">
                <input type="number" id="serverPort" placeholder="端口" value="8765" min="1024" max="65535">
            </div>
        </div>
        
        <div class="input-group">
            <label>消息内容</label>
            <textarea id="messageContent" placeholder="请输入要发送的消息..."></textarea>
        </div>
        
        <button id="connectBtn" class="btn btn-secondary">连接服务器</button>
        <button id="sendBtn" class="btn btn-primary" disabled>发送消息</button>
        
        <div class="message-history">
            <h3>发送记录</h3>
            <div id="messageList" class="message-list"></div>
        </div>
    </div>

    <script>
        // WebSocket 连接
        let ws = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        
        // DOM 元素
        const connectionStatus = document.getElementById('connectionStatus');
        const serverHost = document.getElementById('serverHost');
        const serverPort = document.getElementById('serverPort');
        const messageContent = document.getElementById('messageContent');
        const connectBtn = document.getElementById('connectBtn');
        const sendBtn = document.getElementById('sendBtn');
        const messageList = document.getElementById('messageList');
        
        // 更新连接状态显示
        function updateStatus(status, message) {
            connectionStatus.className = 'connection-status ' + status;
            connectionStatus.textContent = message;
        }
        
        // 连接服务器
        function connect() {
            const host = serverHost.value.trim();
            const port = serverPort.value;
            
            if (!host) {
                alert('请输入服务器地址');
                return;
            }
            
            updateStatus('connecting', '连接中...');
            connectBtn.disabled = true;
            
            try {
                // 使用 ws:// 协议（非加密）
                const wsUrl = `ws://${host}:${port}`;
                ws = new WebSocket(wsUrl);
                
                ws.onopen = function() {
                    updateStatus('connected', '已连接');
                    sendBtn.disabled = false;
                    connectBtn.textContent = '断开连接';
                    connectBtn.disabled = false;
                    reconnectAttempts = 0;
                    addMessage('系统', '连接成功', 'success');
                };
                
                ws.onclose = function() {
                    updateStatus('disconnected', '未连接');
                    sendBtn.disabled = true;
                    connectBtn.textContent = '连接服务器';
                    connectBtn.disabled = false;
                    ws = null;
                };
                
                ws.onerror = function(error) {
                    updateStatus('disconnected', '连接失败');
                    addMessage('系统', '连接失败，请检查服务器地址和端口', 'error');
                    connectBtn.disabled = false;
                };
                
                ws.onmessage = function(event) {
                    // 接收服务器返回的消息
                    console.log('收到服务器消息:', event.data);
                };
                
            } catch (error) {
                updateStatus('disconnected', '连接错误');
                connectBtn.disabled = false;
                addMessage('系统', '连接错误: ' + error.message, 'error');
            }
        }
        
        // 断开连接
        function disconnect() {
            if (ws) {
                ws.close();
            }
        }
        
        // 发送消息
        function sendMessage() {
            const content = messageContent.value.trim();
            
            if (!content) {
                alert('请输入消息内容');
                return;
            }
            
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('未连接到服务器');
                return;
            }
            
            const message = {
                type: 'text',
                content: content,
                timestamp: new Date().toISOString()
            };
            
            try {
                ws.send(JSON.stringify(message));
                addMessage('我', content, 'success');
                messageContent.value = '';
            } catch (error) {
                addMessage('系统', '发送失败: ' + error.message, 'error');
            }
        }
        
        // 添加消息到历史记录
        function addMessage(sender, content, type) {
            const item = document.createElement('div');
            item.className = 'message-item ' + type;
            
            const time = new Date().toLocaleTimeString();
            item.innerHTML = `
                <div class="time">${time} - ${sender}</div>
                <div class="content">${escapeHtml(content)}</div>
            `;
            
            messageList.insertBefore(item, messageList.firstChild);
            
            // 限制历史记录数量
            while (messageList.children.length > 50) {
                messageList.removeChild(messageList.lastChild);
            }
        }
        
        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 事件监听
        connectBtn.addEventListener('click', function() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                disconnect();
            } else {
                connect();
            }
        });
        
        sendBtn.addEventListener('click', sendMessage);
        
        messageContent.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                sendMessage();
            }
        });
        
        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateStatus('disconnected', '未连接');
        });
    </script>
</body>
</html>
